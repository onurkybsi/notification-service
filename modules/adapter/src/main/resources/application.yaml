spring:
  application:
    name: "notification-service"

logging:
  level:
    org.springframework.orm.jpa: DEBUG
    org.springframework.transaction: DEBUG

springdoc:
  swagger-ui:
    path: "/swagger-ui"

db:
  host: ${DB_HOST:localhost}
  port: ${DB_PORT:5432}
  user: ${DB_USER}
  password: ${DB_PASSWORD}
  poolMaxSize: ${DB_POOL_MAX_SIZE:5}