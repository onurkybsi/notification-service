[versions]
spring-context = "6.1.8"
flywayplugin = "9.22.3"
flywaycore = "9.22.3"
nustuderjooq = "9.0"
postgresqljdbcdriver = "42.7.3"
postgresqlr2dbcdriver = "1.0.5.RELEASE"
r2dbcpool = "1.0.1.RELEASE"
spring-datar2dbc = "3.3.0"
testcontainers = "1.19.8"
kotlinxcoroutinestest = "1.8.1"
springdoc = "2.5.0"
spring-transaction = "6.1.8"
junitjupiter = "5.11.0-M2"
mockk = "1.13.11"
springmockk = "4.0.2"

[libraries]
spring-context = { module = "org.springframework:spring-context", version.ref = "spring-context" }
postgresqljdbcdriver = { module = "org.postgresql:postgresql", version.ref = "postgresqljdbcdriver" }
postgresqlr2dbcdriver = { module = "org.postgresql:r2dbc-postgresql", version.ref = "postgresqlr2dbcdriver" }
r2dbcpool = { module = "io.r2dbc:r2dbc-pool", version.ref = "r2dbcpool" }
spring-datar2dbc = { module = "org.springframework.data:spring-data-r2dbc", version.ref = "spring-datar2dbc" }
testcontainers = { module = "org.testcontainers:postgresql", version.ref = "testcontainers" }
flywaycore = { module = "org.flywaydb:flyway-core", version.ref = "flywaycore" }
kotlinxcoroutinestest = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-test", version.ref = "kotlinxcoroutinestest" }
springdoc = { module = "org.springdoc:springdoc-openapi-starter-webflux-ui", version.ref = "springdoc" }
spring-transaction = { module = "org.springframework:spring-tx", version.ref = "spring-transaction" }
junitjupiter = { module = "org.junit.jupiter:junit-jupiter-api", version.ref = "junitjupiter" }
mockk = { module = "io.mockk:mockk", version.ref = "mockk" }
springmockk = { module = "com.ninja-squad:springmockk", version.ref = "springmockk" }

[plugins]
flywayplugin = { id = "org.flywaydb.flyway", version.ref = "flywayplugin" }
nustuderjooq = { id = "nu.studer.jooq", version.ref = "nustuderjooq" }

[bundles]
